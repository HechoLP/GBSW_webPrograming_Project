<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        .account{
            margin: 10px 10px;
        }

        .login{
            float: right;
            background-color: red;
            color: white;
        }
        
        .write{
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="account">
        <label>ID</label>
        <input type="text" class="write">
    </div>
    <div class="account">
        <label>Password</label>
        <input type="password" class="write">
    </div>
    <button type="submit" class="login">Login</button>
</body>
</html>
