<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        /*  # : id
            . : class  */
        #div_id, #div_pw{
            margin: 10px 10px;
        }

        #lbl_id{
            color: red;
        }
        #lbl_pw{
            color: blue;
        }

        input{
            width: 100%;
        }

        #login{
            float: right;
            background: red;
            color: white;
        }
    </style>
</head>
<body>
    <div id="div_id">
        <label id="lbl_id">ID</label>
        <input type="text" id="user_id">
    </div>
    <div id="div_pw">
        <label id="lbl_pw">Password</label>
        <input type="password" id="user_pw">
    </div>
    <button type="submit" id="login">Login</button>
</body>
</html>
